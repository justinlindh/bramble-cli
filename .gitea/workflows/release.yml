name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: linux
    # Gitea runner labels in this environment use "linux" (not GitHub's "ubuntu-latest").
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint latest commit message (Conventional Commits)
        run: |
          npx --yes -p @commitlint/cli -p @commitlint/config-conventional \
            commitlint --config .commitlintrc.cjs --last --verbose

      - name: Run semantic-release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL: ${{ secrets.GITEA_URL }}
        run: |
          npx --yes \
            -p semantic-release \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @saithodev/semantic-release-gitea \
            semantic-release
