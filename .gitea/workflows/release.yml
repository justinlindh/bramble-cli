name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  COMMITLINT_VERSION: '20.4.3'
  SEMANTIC_RELEASE_VERSION: '25.0.3'
  SEMREL_COMMIT_ANALYZER_VERSION: '13.0.1'
  SEMREL_NOTES_GENERATOR_VERSION: '14.1.0'
  SEMREL_GITEA_PLUGIN_VERSION: '2.1.0'

jobs:
  release:
    # Gitea runner labels in this environment use "linux" (not GitHub's "ubuntu-latest").
    runs-on: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore npm cache and prewarmed release tools
        uses: actions/cache@v4
        with:
          # Deterministic cache for npm tarballs + installed CLI tools.
          # Invalidation triggers: OS, node major, pinned tool versions,
          # and workflow/release config changes.
          path: |
            ~/.npm
            ~/.cache/bramble-cli/release-tools
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-release-tools-${{ env.COMMITLINT_VERSION }}-${{ env.SEMANTIC_RELEASE_VERSION }}-${{ env.SEMREL_COMMIT_ANALYZER_VERSION }}-${{ env.SEMREL_NOTES_GENERATOR_VERSION }}-${{ env.SEMREL_GITEA_PLUGIN_VERSION }}-${{ hashFiles('.gitea/workflows/release.yml', '.commitlintrc.cjs', '.releaserc.cjs') }}

      - name: Install release tools (pinned, cached)
        run: |
          set -euo pipefail
          TOOLS_DIR="$HOME/.cache/bramble-cli/release-tools"
          mkdir -p "$TOOLS_DIR"
          if [ ! -x "$TOOLS_DIR/node_modules/.bin/semantic-release" ] || [ ! -x "$TOOLS_DIR/node_modules/.bin/commitlint" ]; then
            npm install --prefix "$TOOLS_DIR" --no-save \
              "@commitlint/cli@${COMMITLINT_VERSION}" \
              "@commitlint/config-conventional@${COMMITLINT_VERSION}" \
              "semantic-release@${SEMANTIC_RELEASE_VERSION}" \
              "@semantic-release/commit-analyzer@${SEMREL_COMMIT_ANALYZER_VERSION}" \
              "@semantic-release/release-notes-generator@${SEMREL_NOTES_GENERATOR_VERSION}" \
              "@saithodev/semantic-release-gitea@${SEMREL_GITEA_PLUGIN_VERSION}"
          fi

      - name: Lint latest commit message (Conventional Commits)
        run: |
          export PATH="$HOME/.cache/bramble-cli/release-tools/node_modules/.bin:$PATH"
          commitlint --config .commitlintrc.cjs --last --verbose

      - name: Run semantic-release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL: ${{ secrets.GITEA_URL }}
        run: |
          export PATH="$HOME/.cache/bramble-cli/release-tools/node_modules/.bin:$PATH"
          semantic-release
