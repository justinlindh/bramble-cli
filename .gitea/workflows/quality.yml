name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-${{ gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.25.x'
  GOLANGCI_LINT_VERSION: 'v1.64.8'
  GOVULNCHECK_VERSION: 'v1.1.4'
  ACTIONLINT_VERSION: 'v1.7.11'
  MARKDOWNLINT_VERSION: '0.21.0'

jobs:
  go-baseline:
    name: Go baseline (required)
    runs-on: linux
    timeout-minutes: 20
    env:
      GOPRIVATE: github.com
      GONOPROXY: github.com
      GONOSUMDB: github.com
      GOPROXY: https://proxy.golang.org,direct
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure CI_GIT_PAT is configured
        run: |
          test -n "${{ vars.CI_GIT_PAT }}" || (echo "CI_GIT_PAT action variable is missing"; exit 1)

      - name: Configure git auth for internal module fetch (.netrc)
        run: |
          cat > "$HOME/.netrc" <<NETRC
          machine github.com
            login oauth2
            password ${{ vars.CI_GIT_PAT }}
          NETRC
          chmod 600 "$HOME/.netrc"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
          cache-dependency-path: go.sum

      - name: Prewarm module cache (deterministic; skip local replace)
        # Invalidation: go.sum hash changes via setup-go cache-dependency-path.
        run: |
          if grep -Eq '^replace\s+.*\.\./' go.mod; then
            echo "Skipping prewarm: go.mod contains local replace paths unavailable in CI checkout."
            exit 0
          fi
          go mod download

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

  quality-required:
    name: Quality gates (required)
    runs-on: linux
    timeout-minutes: 25
    env:
      GOPRIVATE: github.com
      GONOPROXY: github.com
      GONOSUMDB: github.com
      GOPROXY: https://proxy.golang.org,direct
    needs:
      - go-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure CI_GIT_PAT is configured
        run: |
          test -n "${{ vars.CI_GIT_PAT }}" || (echo "CI_GIT_PAT action variable is missing"; exit 1)

      - name: Configure git auth for internal module fetch (.netrc)
        run: |
          cat > "$HOME/.netrc" <<NETRC
          machine github.com
            login oauth2
            password ${{ vars.CI_GIT_PAT }}
          NETRC
          chmod 600 "$HOME/.netrc"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
          cache-dependency-path: go.sum

      - name: Install quality tools
        run: |
          set -euo pipefail

          export GOBIN="$HOME/.cache/bramble-cli/go-tools/bin"
          export PATH="$GOBIN:$PATH"
          mkdir -p "$GOBIN"

          command -v golangci-lint >/dev/null || go install "github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
          command -v govulncheck >/dev/null || go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

          NPM_TOOLS_DIR="$HOME/.cache/bramble-cli/npm-tools"
          mkdir -p "$NPM_TOOLS_DIR"
          if [ ! -x "$NPM_TOOLS_DIR/node_modules/.bin/markdownlint-cli2" ]; then
            npm install --prefix "$NPM_TOOLS_DIR" --no-save "markdownlint-cli2@${MARKDOWNLINT_VERSION}"
          fi

      - name: Go lint (required)
        run: |
          export PATH="$HOME/.cache/bramble-cli/go-tools/bin:$PATH"
          golangci-lint run ./...

      - name: Shellcheck scripts (required)
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null; then
            echo "shellcheck missing on runner; installing fallback package"
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck scripts/*.sh examples/*.sh

      - name: Build CLI binary for doc drift checks
        run: go build -o bramble ./cmd/bramble

      - name: Docs drift check (required)
        run: bash scripts/check-doc-drift.sh

      - name: Markdown lint (required)
        run: |
          "$HOME/.cache/bramble-cli/npm-tools/node_modules/.bin/markdownlint-cli2" "**/*.md"

      - name: Go vuln check (required; fail on findings)
        run: |
          export PATH="$HOME/.cache/bramble-cli/go-tools/bin:$PATH"
          govulncheck ./...

  quality-advisory:
    name: Quality checks (advisory)
    runs-on: linux
    timeout-minutes: 10
    needs:
      - quality-required
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
          cache-dependency-path: go.sum

      - name: Install workflow lint tool
        continue-on-error: true
        run: |
          export GOBIN="$HOME/.cache/bramble-cli/go-tools/bin"
          export PATH="$GOBIN:$PATH"
          mkdir -p "$GOBIN"
          command -v actionlint >/dev/null || go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"

      - name: Workflow lint (advisory)
        continue-on-error: true
        run: |
          export PATH="$HOME/.cache/bramble-cli/go-tools/bin:$PATH"
          actionlint .gitea/workflows/*.yml
