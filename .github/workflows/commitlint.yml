name: Commitlint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  COMMITLINT_VERSION: '20.4.3'

jobs:
  commitlint:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install commitlint (pinned)
        run: |
          set -euo pipefail
          npm install --no-save \
            "@commitlint/cli@${COMMITLINT_VERSION}" \
            "@commitlint/config-conventional@${COMMITLINT_VERSION}"

      - name: Validate commit messages
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            npx commitlint --config .commitlintrc.cjs --from "$PR_BASE_SHA" --to "$PR_HEAD_SHA" --verbose
          elif [ "$PUSH_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            npx commitlint --config .commitlintrc.cjs --last --verbose
          else
            npx commitlint --config .commitlintrc.cjs --from "$PUSH_BEFORE_SHA" --to "$PUSH_SHA" --verbose
          fi
